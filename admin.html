<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Управление новостями</title>
</head>
<body>
    <div class="admin-container" style="max-width: 800px; margin: 50px auto; padding: 20px;">
        <h1>Управление новостями</h1>
        
        <div id="admin-news-list"></div>
        
        <h2>➕ Добавить новость</h2>
        <form id="news-form">
            <input type="text" id="news-title" placeholder="Заголовок" required style="width: 100%; padding: 10px; margin-bottom: 10px;">
            <textarea id="news-content" placeholder="Текст новости" rows="4" required style="width: 100%; padding: 10px; margin-bottom: 10px;"></textarea>
            <button type="submit" style="background: #512da8; color: white; padding: 10px 20px; border: none; border-radius: 5px;">Опубликовать</button>
        </form>
        
        <button id="logout-btn" style="margin-top: 20px; background: #f44336; color: white; padding: 8px 16px; border: none; border-radius: 5px;">Выйти</button>
    </div>
    
    <script src="admin.js"></script>
</body>
</html>
